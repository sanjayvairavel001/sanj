<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjay Vairavel | Interactive Profile</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#00c6ff);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:380px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    text-align:center;
    color:#fff;
    transition:.4s;
    position:relative;
}

.card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 20px 50px rgba(0,255,255,.3);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00E5FF,#4F46E5);
    font-size:55px;
    font-weight:bold;
    color:#fff;
    box-shadow:0 0 30px rgba(0,255,255,.6);
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

h1{
    margin-top:25px;
    font-size:30px;
}

.typing{
    margin-top:10px;
    font-size:18px;
    color:#8be9fd;
    height:28px;
}

p{
    margin-top:20px;
    color:#ddd;
    line-height:1.7;
}

.buttons{
    margin-top:30px;
}

.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;
    background:#0077B5;
    padding:14px 28px;
    border-radius:40px;
    transition:.3s;
    font-weight:600;
}

.btn:hover{
    transform:scale(1.08);
    background:#005885;
    box-shadow:0 0 20px rgba(0,119,181,.6);
}

.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:#00e5ff;
    filter:blur(120px);
    opacity:.15;
    z-index:-1;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

<div class="avatar">SV</div>

<h1>Sanjay Vairavel</h1>

<div class="typing" id="typing"></div>

<p>
Business Development Professional • Technology Enthusiast •
Passionate about AI, Digital Transformation, Enterprise Solutions,
and Building Meaningful Connections.
</p>

<div class="buttons">
<a class="btn"
href="https://www.linkedin.com/in/sanjay-vairavel/"
target="_blank">
<i class="fab fa-linkedin"></i>
Connect on LinkedIn
</a>
</div>

</div>

<script>
const text = "Business Development Executive";
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,80);
    }
}

window.onload = typeWriter;
</script>

</body>
</html>
